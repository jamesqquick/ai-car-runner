<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Remix — Cloudflare Car Runner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050510;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .header-title {
      font-family: 'Orbitron', monospace;
      font-size: 16px;
      font-weight: 900;
      color: #f97316;
      letter-spacing: 3px;
    }
    .back-link {
      font-size: 12px;
      color: #555;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: #f97316; }

    /* Chat area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
    }

    /* Messages */
    .msg {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      animation: msgIn 0.3s ease-out;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .msg-avatar.bot {
      background: rgba(249, 115, 22, 0.15);
      border: 1px solid rgba(249, 115, 22, 0.2);
    }
    .msg-avatar.user {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .msg-bubble {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      border-top-left-radius: 4px;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.6;
      color: #ccc;
      max-width: 440px;
    }
    .msg.from-user {
      flex-direction: row-reverse;
    }
    .msg.from-user .msg-bubble {
      background: rgba(249, 115, 22, 0.08);
      border-color: rgba(249, 115, 22, 0.15);
      border-top-left-radius: 12px;
      border-top-right-radius: 4px;
      color: #e5e7eb;
    }

    /* Example prompts */
    .examples {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .example-btn {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 12px;
      color: #888;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .example-btn:hover {
      color: #f97316;
      border-color: rgba(249, 115, 22, 0.3);
      background: rgba(249, 115, 22, 0.06);
    }

    /* Input bar */
    .input-bar {
      padding: 16px 24px;
      border-top: 1px solid rgba(255,255,255,0.04);
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
    }
    .input-row {
      display: flex;
      gap: 10px;
    }
    #prompt-input {
      flex: 1;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      padding: 12px 16px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      background: rgba(255,255,255,0.04);
      color: #fff;
      outline: none;
      transition: border-color 0.2s;
    }
    #prompt-input:focus { border-color: rgba(249, 115, 22, 0.4); }
    #prompt-input::placeholder { color: #444; }
    #send-btn {
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      font-weight: 700;
      padding: 12px 20px;
      border: none;
      border-radius: 24px;
      background: #f97316;
      color: #000;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.2s;
      white-space: nowrap;
    }
    #send-btn:hover { background: #fb923c; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .char-count {
      font-size: 10px;
      color: #333;
      text-align: right;
      margin-top: 4px;
    }

    /* Pipeline steps in chat */
    .pipeline-msg {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 4px;
    }
    .p-step {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #333;
      transition: color 0.3s;
    }
    .p-step.active { color: #888; }
    .p-step.done { color: #22c55e; }
    .p-step-icon { width: 16px; text-align: center; }
    .p-step-product {
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      color: #f97316;
      letter-spacing: 1px;
    }

    /* Result in chat */
    .result-card {
      background: rgba(34, 197, 94, 0.05);
      border: 1px solid rgba(34, 197, 94, 0.15);
      border-radius: 10px;
      padding: 16px;
      margin-top: 8px;
      text-align: center;
    }
    .result-title {
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      color: #f97316;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }
    .play-link {
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      font-weight: 700;
      padding: 12px 32px;
      border: none;
      border-radius: 6px;
      background: #f97316;
      color: #000;
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      display: inline-block;
      transition: all 0.2s;
    }
    .play-link:hover { background: #fb923c; }
    .share-url {
      font-family: monospace;
      font-size: 11px;
      color: #555;
      margin-top: 10px;
      word-break: break-all;
    }
    .copy-btn {
      font-size: 10px;
      color: #888;
      background: none;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      padding: 3px 10px;
      cursor: pointer;
      margin-top: 6px;
      transition: all 0.2s;
    }
    .copy-btn:hover { color: #f97316; border-color: rgba(249,115,22,0.3); }

    /* Mobile */
    @media (max-width: 600px) {
      .header-title { font-size: 13px; }
      .chat-area { padding: 16px; }
      .msg-bubble { font-size: 13px; padding: 10px 14px; }
      .example-btn { font-size: 11px; padding: 5px 11px; }
      .input-bar { padding: 12px 16px; }
      #prompt-input { font-size: 13px; padding: 10px 14px; }
      #send-btn { font-size: 11px; padding: 10px 16px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">REMIX</div>
    <a href="/" class="back-link">Back to Car Runner</a>
  </div>

  <div class="chat-area" id="chat">
    <div class="msg">
      <div class="msg-avatar bot">🏎️</div>
      <div class="msg-bubble">
        <div>Describe how you'd like to remix Car Runner. You can change:</div>
        <div style="margin-top:8px; font-size:13px; color:#888;">
          <strong style="color:#bbb;">Theme</strong> — space, underwater, neon, desert...<br>
          <strong style="color:#bbb;">Obstacles</strong> — asteroids, fish, lasers...<br>
          <strong style="color:#bbb;">Speed</strong> — faster, slower, ramping...<br>
          <strong style="color:#bbb;">Special rules</strong> — 3 lives, countdown timer, moving obstacles
        </div>
        <div class="examples">
          <button class="example-btn" data-prompt="space theme with asteroids, fast">🚀 Space</button>
          <button class="example-btn" data-prompt="underwater with fish obstacles, slow and calm">🌊 Underwater</button>
          <button class="example-btn" data-prompt="neon cyberpunk, very fast, moving obstacles">⚡ Cyberpunk</button>
          <button class="example-btn" data-prompt="desert sandstorm, 3 lives">🏜️ Desert</button>
          <button class="example-btn" data-prompt="ice road, slippery, 60 second countdown">❄️ Ice Road</button>
          <button class="example-btn" data-prompt="lava world, chaos mode, very fast">🔥 Lava</button>
        </div>
      </div>
    </div>
  </div>

  <div class="input-bar">
    <div class="input-row">
      <input type="text" id="prompt-input" placeholder="Describe your remix..." maxlength="100" autocomplete="off" />
      <button id="send-btn">Send</button>
    </div>
    <div class="char-count"><span id="char-count">0</span>/100</div>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("prompt-input");
    const sendBtn = document.getElementById("send-btn");
    const charCount = document.getElementById("char-count");

    function getUserId() {
      try {
        const stored = localStorage.getItem("car_runner_user");
        if (stored) return JSON.parse(stored).id;
      } catch {}
      return null;
    }

    // Char count
    input.addEventListener("input", () => {
      charCount.textContent = input.value.length;
    });

    // Example buttons
    document.querySelectorAll(".example-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        input.value = btn.dataset.prompt || "";
        charCount.textContent = input.value.length;
        input.focus();
      });
    });

    sendBtn.addEventListener("click", send);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") send();
    });

    function addMsg(html, from = "bot") {
      const div = document.createElement("div");
      div.className = `msg ${from === "user" ? "from-user" : ""}`;
      const avatar = from === "user" ? "👤" : "🏎️";
      const avatarClass = from === "user" ? "user" : "bot";
      div.innerHTML = `
        <div class="msg-avatar ${avatarClass}">${avatar}</div>
        <div class="msg-bubble">${html}</div>
      `;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function setStep(stepEl, state) {
      const icon = stepEl.querySelector(".p-step-icon");
      stepEl.classList.remove("active", "done");
      if (state === "active") { stepEl.classList.add("active"); icon.textContent = "●"; }
      else if (state === "done") { stepEl.classList.add("done"); icon.textContent = "✓"; }
      else { icon.textContent = "○"; }
    }

    async function send() {
      const prompt = input.value.trim();
      if (!prompt) return;

      const userId = getUserId();
      if (!userId) {
        addMsg("You need to play the main game first to create an account. <a href='/' style='color:#f97316;'>Go to Car Runner</a>");
        return;
      }

      // Show user message
      addMsg(prompt, "user");
      input.value = "";
      charCount.textContent = "0";
      sendBtn.disabled = true;

      // Show pipeline
      const pipelineMsg = addMsg(`
        <div>Building your remix...</div>
        <div class="pipeline-msg">
          <div class="p-step" id="ps-ai">
            <span class="p-step-icon">○</span>
            <span><span class="p-step-product">Workers AI</span> Generating theme</span>
          </div>
          <div class="p-step" id="ps-d1">
            <span class="p-step-icon">○</span>
            <span><span class="p-step-product">D1</span> Saving remix</span>
          </div>
          <div class="p-step" id="ps-deploy">
            <span class="p-step-icon">○</span>
            <span><span class="p-step-product">Workers</span> Deploying to edge</span>
          </div>
        </div>
      `);

      const stepAI = pipelineMsg.querySelector("#ps-ai");
      const stepD1 = pipelineMsg.querySelector("#ps-d1");
      const stepDeploy = pipelineMsg.querySelector("#ps-deploy");

      setStep(stepAI, "active");

      try {
        const res = await fetch("/api/remix", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt, user_id: userId }),
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || "Generation failed");
        }

        setStep(stepAI, "done");
        setStep(stepD1, "active");
        await sleep(500);
        setStep(stepD1, "done");

        const data = await res.json();

        setStep(stepDeploy, "active");
        await sleep(600);
        setStep(stepDeploy, "done");
        await sleep(300);

        const title = data.config?.title || "Custom Remix";
        const remixUrl = `${location.origin}/remix/${data.id}`;

        addMsg(`
          <div class="result-card">
            <div class="result-title">${escapeHtml(title)}</div>
            <a class="play-link" href="/remix/${data.id}">Play Remix</a>
            <div class="share-url">${remixUrl}</div>
            <button class="copy-btn" onclick="navigator.clipboard.writeText('${remixUrl}').then(()=>{this.textContent='Copied!';setTimeout(()=>{this.textContent='Copy Link'},2000)})">Copy Link</button>
          </div>
        `);

        sendBtn.disabled = false;
      } catch (err) {
        addMsg(`Something went wrong: ${err.message}. Try again!`);
        sendBtn.disabled = false;
      }
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
  </script>
</body>
</html>
