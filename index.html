<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloudflare Car Runner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      overflow: hidden;
      font-family: 'Inter', system-ui, sans-serif;
      color: #fff;
    }
    #game-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    /* Crash flash overlay */
    #crash-flash {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, rgba(249,115,22,0.8) 0%, rgba(239,68,68,0.6) 50%, transparent 100%);
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.05s;
    }

    /* HUD */
    #hud {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 24px 32px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      z-index: 10;
    }
    #score-display {
      font-family: 'Orbitron', monospace;
      font-size: 56px;
      font-weight: 900;
      text-shadow: 0 0 30px rgba(249, 115, 22, 0.7), 0 0 60px rgba(249, 115, 22, 0.3);
      color: #f97316;
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
    }
    #score-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #666;
      margin-bottom: 4px;
    }
    #speed-display {
      font-family: 'Orbitron', monospace;
      font-size: 16px;
      color: #666;
      margin-top: 4px;
      letter-spacing: 1px;
    }

    /* HUD Leaderboard overlay */
    #leaderboard {
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(249, 115, 22, 0.2);
      border-radius: 10px;
      padding: 14px 18px;
      min-width: 220px;
      backdrop-filter: blur(12px);
    }
    #leaderboard h3 {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #f97316;
      margin-bottom: 10px;
    }
    .lb-entry {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 3px 0;
      color: #888;
    }
    .lb-entry .rank {
      color: #f97316;
      margin-right: 8px;
      font-weight: 600;
    }

    /* ─── Login screen ─── */
    #start-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, rgba(10,10,30,0.9) 0%, rgba(0,0,0,0.95) 100%);
      z-index: 20;
    }
    #start-screen h1 {
      font-family: 'Orbitron', monospace;
      font-size: 72px;
      font-weight: 900;
      color: #f97316;
      text-shadow: 0 0 60px rgba(249, 115, 22, 0.6), 0 0 120px rgba(249, 115, 22, 0.2);
      margin-bottom: 4px;
      letter-spacing: 6px;
    }
    #start-screen .subtitle {
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      color: #555;
      margin-bottom: 50px;
      letter-spacing: 6px;
      text-transform: uppercase;
    }
    .cf-logo {
      width: 40px;
      height: 40px;
      margin-bottom: 16px;
      opacity: 0.6;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Login form */
    #login-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 30px;
    }
    #login-form input {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 16px;
      padding: 12px 20px;
      width: 300px;
      border: 1px solid rgba(249, 115, 22, 0.3);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      outline: none;
      transition: border-color 0.2s;
    }
    #login-form input:focus { border-color: #f97316; }
    #login-form input::placeholder { color: #555; }
    #login-form button {
      font-family: 'Orbitron', monospace;
      font-size: 16px;
      font-weight: 700;
      padding: 14px 40px;
      border: none;
      border-radius: 6px;
      background: #f97316;
      color: #000;
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: background 0.2s, transform 0.1s;
    }
    #login-form button:hover { background: #fb923c; transform: scale(1.02); }
    #login-form button:disabled { background: #555; cursor: not-allowed; transform: none; }
    #login-error {
      color: #ef4444;
      font-size: 13px;
      min-height: 18px;
    }

    /* ─── Lobby screen (pre-game + post-game) ─── */
    #lobby-screen {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, rgba(10,10,30,0.9) 0%, rgba(0,0,0,0.95) 100%);
      z-index: 20;
    }
    #lobby-screen h1 {
      font-family: 'Orbitron', monospace;
      font-size: 56px;
      font-weight: 900;
      color: #f97316;
      text-shadow: 0 0 50px rgba(249, 115, 22, 0.5);
      margin-bottom: 4px;
      letter-spacing: 5px;
    }
    #lobby-screen .subtitle {
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      color: #555;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    /* Crash result section (hidden on first visit) */
    #lobby-crash-result {
      display: none;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
    }
    #lobby-crash-result.visible { display: flex; }
    #lobby-crash-title {
      font-family: 'Orbitron', monospace;
      font-size: 18px;
      font-weight: 900;
      color: #ef4444;
      letter-spacing: 4px;
      margin-bottom: 8px;
    }
    #lobby-crash-score {
      font-family: 'Orbitron', monospace;
      font-size: 64px;
      font-weight: 900;
      color: #f97316;
      text-shadow: 0 0 40px rgba(249, 115, 22, 0.5);
      letter-spacing: 3px;
      line-height: 1;
    }
    #lobby-crash-label {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-top: 2px;
      margin-bottom: 4px;
    }
    #lobby-crash-rank {
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      color: #888;
      letter-spacing: 2px;
    }
    #lobby-crash-congrats {
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      font-weight: 700;
      color: #f97316;
      text-shadow: 0 0 15px rgba(249, 115, 22, 0.5);
      letter-spacing: 2px;
      margin-top: 4px;
      min-height: 20px;
    }

    #lobby-player-name {
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      color: #666;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }
    #lobby-leaderboard {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(249, 115, 22, 0.15);
      border-radius: 10px;
      padding: 16px 24px;
      min-width: 300px;
      max-width: 360px;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
    }
    #lobby-leaderboard h3 {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #f97316;
      margin-bottom: 12px;
      text-align: center;
    }
    #lobby-leaderboard .lb-entry {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 3px 0;
      color: #888;
    }
    #lobby-leaderboard .lb-entry .rank {
      color: #f97316;
      margin-right: 8px;
      font-weight: 600;
    }
    #lobby-leaderboard .lb-entry.is-you {
      color: #fff;
      font-weight: 600;
    }
    .lobby-options {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .lobby-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #888;
      cursor: pointer;
    }
    .lobby-toggle input[type="checkbox"] {
      accent-color: #f97316;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
    #lobby-start-btn {
      font-family: 'Orbitron', monospace;
      font-size: 18px;
      font-weight: 700;
      padding: 16px 50px;
      border: none;
      border-radius: 6px;
      background: #f97316;
      color: #000;
      cursor: pointer;
      letter-spacing: 3px;
      text-transform: uppercase;
      transition: background 0.2s, transform 0.1s;
    }
    #lobby-start-btn:hover { background: #fb923c; transform: scale(1.02); }

    /* AI Commentary overlay */
    #commentary-overlay {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      max-width: 400px;
      width: 80%;
      text-align: center;
      pointer-events: none;
      z-index: 15;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #commentary-overlay.visible { opacity: 1; }
    #commentary-text {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.75);
      line-height: 1.3;
      padding: 8px 16px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 6px;
      backdrop-filter: blur(6px);
    }
    #commentary-badge {
      font-family: 'Orbitron', monospace;
      font-size: 8px;
      color: rgba(249, 115, 22, 0.5);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="crash-flash"></div>

  <div id="commentary-overlay">
    <div id="commentary-badge">AI Commentator — Workers AI</div>
    <div id="commentary-text"></div>
  </div>

  <div id="hud">
    <div>
      <div id="score-label">Distance</div>
      <div id="score-display">0</div>
      <div id="speed-display">0 km/h</div>
    </div>
    <div id="leaderboard">
      <h3>Top Scores</h3>
      <div id="leaderboard-entries">
        <div class="lb-entry" style="color: #444;">No scores yet</div>
      </div>
    </div>
  </div>

  <div id="start-screen">
    <svg class="cf-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="45" stroke="#f97316" stroke-width="3" fill="none" opacity="0.5"/>
      <path d="M30 55 L50 35 L70 55 L60 55 L60 70 L40 70 L40 55 Z" fill="#f97316" opacity="0.8"/>
    </svg>
    <h1>CAR RUNNER</h1>
    <div class="subtitle">Powered by Cloudflare</div>
    <form id="login-form">
      <input type="text" id="login-name" placeholder="Your name" required autocomplete="off" />
      <input type="email" id="login-email" placeholder="Email address" required autocomplete="off" />
      <div id="login-error"></div>
      <button type="submit">Continue</button>
    </form>
  </div>

  <div id="lobby-screen">
    <h1>CAR RUNNER</h1>
    <div class="subtitle">Powered by Cloudflare</div>

    <div id="lobby-crash-result">
      <div id="lobby-crash-title">CRASHED</div>
      <div id="lobby-crash-score">0</div>
      <div id="lobby-crash-label">Distance</div>
      <div id="lobby-crash-rank"></div>
      <div id="lobby-crash-congrats"></div>
    </div>

    <div id="lobby-player-name"></div>
    <div id="lobby-leaderboard">
      <h3>Leaderboard</h3>
      <div id="lobby-leaderboard-entries"></div>
    </div>
    <div class="lobby-options">
      <label class="lobby-toggle">
        <input type="checkbox" id="commentary-toggle" />
        Enable live AI commentary
      </label>
    </div>
    <button id="lobby-start-btn">Start Race</button>
  </div>

  <script type="module" src="/src/game.ts"></script>
</body>
</html>
